<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/mf-tracker/favicon.ico" />
    <link rel="apple-touch-icon" href="/mf-tracker/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Theme & App Config -->
    <meta name="theme-color" content="#0a0f1e" />
    <meta name="description" content="Track, compare and analyze Indian mutual funds with real-time NAV data, historical charts, SIP calculators and watchlists." />
    
    <title>MF Tracker - Mutual Fund Tracker India</title>

    <!-- SPA Redirect resolution script -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
